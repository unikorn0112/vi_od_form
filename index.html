<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>國師傅｜精選商品</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        :root { --main-brown: #5D4037; --bg: #FDF5E6; }
        body { background: var(--bg); padding: 15px; font-family: "Microsoft JhengHei"; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .item-row { border-bottom: 1px solid #eee; padding: 10px 0; display: flex; align-items: center; }
        .item-name { flex: 2; font-weight: bold; font-size: 0.9em; }
        .item-price { flex: 1; color: #8B5A2B; font-weight: bold; }
        .qty-input { width: 70px; }
        .summary { background: #FFF3E0; border-radius: 10px; padding: 15px; margin-top: 15px; }
        .btn-order { background: var(--main-brown); color: white; font-weight: bold; padding: 12px; }
        #addrField { display: none; }
    </style>
</head>
<body>
    <div class="container card p-4">
        <h4 class="text-center mb-4" style="color: var(--main-brown);">漢草植物精華點單</h4>
        
        <!-- 商品清單 -->
        <div id="itemList">
            <div class="item-row"><div class="item-name">精明草眼敷組(2對)</div><div class="item-price">$399</div><input type="number" class="qty form-control qty-input" data-name="精明草眼敷組" data-price="399" value="0" min="0" onchange="calc()"></div>
            <div class="item-row"><div class="item-name">溫養軟頸敷組(2對)</div><div class="item-price">$399</div><input type="number" class="qty form-control qty-input" data-name="軟頸敷組" data-price="399" value="0" min="0" onchange="calc()"></div>
            <div class="item-row"><div class="item-name">育髮精萃(80ML)</div><div class="item-price">$680</div><input type="number" class="qty form-control qty-input" data-name="育髮精萃" data-price="680" value="0" min="0" onchange="calc()"></div>
            <div class="item-row"><div class="item-name">護頸精華油(10ML)</div><div class="item-price">$1200</div><input type="number" class="qty form-control qty-input" data-name="護頸油" data-price="1200" value="0" min="0" onchange="calc()"></div>
            <div class="item-row"><div class="item-name">炯炯有神精華油(10ML)</div><div class="item-price">$1200</div><input type="number" class="qty form-control qty-input" data-name="炯炯油" data-price="1200" value="0" min="0" onchange="calc()"></div>
        </div>

        <!-- 配送選擇 -->
        <div class="mt-3">
            <label><b>取貨方式</b></label>
            <select id="method" class="form-control" onchange="toggleAddr()">
                <option value="自取">門市自取 (免運費)</option>
                <option value="宅配">宅配到府 (+運費 $100)</option>
            </select>
        </div>

        <div id="addrField" class="mt-2">
            <label><b>收件地址</b></label>
            <textarea id="addr" class="form-control" placeholder="請輸入完整地址"></textarea>
        </div>

        <!-- 結帳金額 -->
        <div class="summary">
            <div class="d-flex justify-content-between"><span>商品合計</span><span>$ <span id="sub">0</span></span></div>
            <div class="d-flex justify-content-between"><span>運費</span><span>$ <span id="ship">0</span></span></div>
            <hr>
            <div class="d-flex justify-content-between font-weight-bold" style="font-size: 1.2em;"><span>總計</span><span style="color:red;">$ <span id="total">0</span></span></div>
        </div>

        <div class="mt-3"><label>聯絡姓名</label><input type="text" id="uName" class="form-control"></div>
        <div class="mt-2"><label>聯絡電話</label><input type="tel" id="uPhone" class="form-control"></div>

        <button class="btn btn-order btn-block mt-4" onclick="submitOrder()">確認送出訂單</button>
    </div>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
        function toggleAddr() {
            document.getElementById('addrField').style.display = document.getElementById('method').value === '宅配' ? 'block' : 'none';
            calc();
        }
        function calc() {
            let sub = 0;
            document.querySelectorAll('.qty').forEach(i => { sub += i.value * i.dataset.price; });
            let ship = (document.getElementById('method').value === '宅配' && sub > 0) ? 100 : 0;
            document.getElementById('sub').innerText = sub;
            document.getElementById('ship').innerText = ship;
            document.getElementById('total').innerText = sub + ship;
        }

        async function init() {
            await liff.init({ liffId: "2009407080-Od6lcvqf" });
            if (!liff.isLoggedIn()) liff.login();
            const p = await liff.getProfile();
            document.getElementById('uName').value = p.displayName;
        }
        init();

        async function submitOrder() {
            let items = [];
            document.querySelectorAll('.qty').forEach(i => { if(i.value > 0) items.push(i.dataset.name + "x" + i.value); });
            if(items.length === 0) return alert("請選擇商品");
            
            const data = {
                userId: liff.getContext().userId,
                userName: document.getElementById('uName').value,
                phone: document.getElementById('uPhone').value,
                method: document.getElementById('method').value,
                items: items.join(", "),
                price: document.getElementById('total').innerText,
                note: document.getElementById('method').value === '宅配' ? document.getElementById('addr').value : "門市自取"
            };

            await fetch('https://script.google.com/macros/s/AKfycbwv8oFL-Q4E9MlWmmXJd0yVEb_aagpFOwZn8UQ0nAv7gBozrpm2ZTEhsmoZop0beKnD/exec', { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            alert("訂單已送出，請依LINE訊息完成匯款！");
            liff.closeWindow();
        }
    </script>
</body>
</html>
