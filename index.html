<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>國師傅｜精選商品</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        :root { --primary-color: #5D4037; --accent-color: #8B5A2B; --bg-color: #FDF5E6; }
        body { background-color: var(--bg-color); padding: 15px; font-family: "Microsoft JhengHei", sans-serif; color: #333; }
        .container { max-width: 500px; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(139, 90, 43, 0.15); margin: auto; }
        .category-title { background: #EFEBE9; padding: 5px 15px; border-radius: 5px; font-weight: bold; color: var(--primary-color); margin-top: 15px; margin-bottom: 10px; }
        .item-row { border-bottom: 1px solid #f0f0f0; padding: 12px 0; display: flex; align-items: center; justify-content: space-between; }
        .item-name { flex: 2; font-size: 0.95em; font-weight: 500; }
        .item-price { color: var(--accent-color); flex: 1; text-align: center; font-weight: bold; }
        .item-qty { width: 75px; }
        .summary-box { background: #FFF3E0; padding: 15px; border-radius: 10px; margin-top: 20px; border: 1px solid #FFE0B2; }
        .total-line { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 5px; }
        .btn-submit { background-color: var(--primary-color); color: white; border: none; font-weight: bold; margin-top: 25px; padding: 14px; border-radius: 8px; font-size: 1.1em; }
        .btn-submit:hover { background-color: #3E2723; color: white; }
        label { font-weight: bold; color: var(--primary-color); margin-top: 12px; }
        #addressSection { display: none; }
        .hint-text { font-size: 0.85em; color: #827717; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h3 class="text-center mb-4" style="color: var(--primary-color); font-weight: bold;">漢草植物精華點單</h3>
        
        <div class="category-title">【溫養敷包系列】</div>
        <div class="item-list">
            <div class="item-row"><div class="item-name">精明草眼敷組 (2對)</div><div class="item-price">$399</div><input type="number" class="form-control item-qty" data-name="精明草眼敷組" data-price="399" value="0" min="0" onchange="calc()"></div>
            <div class="item-row"><div class="item-name">溫養軟頸敷組 (2對)</div><div class="item-price">$399</div><input type="number" class="form-control item-qty" data-name="溫養軟頸敷組" data-price="399" value="0" min="0" onchange="calc()"></div>
            <div class="item-row"><div class="item-name">溫養泡足粉組 (2包)</div><div class="item-price">$399</div><input type="number" class="form-control item-qty" data-name="溫養泡足粉組" data-price="399" value="0" min="0" onchange="calc()"></div>
        </div>

        <div class="category-title">【精華護理系列】</div>
        <div class="item-list">
            <div class="item-row"><div class="item-name">育髮精萃 (80ML)</div><div class="item-price">$680</div><input type="number" class="form-control item-qty" data-name="育髮精萃" data-price="680" value="0" min="0" onchange="calc()"></div>
            <div class="item-row"><div class="item-name">護頸精華油 (10ML)</div><div class="item-price">$1200</div><input type="number" class="form-control item-qty" data-name="護頸精華油" data-price="1200" value="0" min="0" onchange="calc()"></div>
            <div class="item-row"><div class="item-name">炯炯有神精華油 (10ML)</div><div class="item-price">$1200</div><input type="number" class="form-control item-qty" data-name="炯炯油" data-price="1200" value="0" min="0" onchange="calc()"></div>
            <div class="item-row"><div class="item-name">足部酵素噴霧 (80ML)</div><div class="item-price">$680</div><input type="number" class="form-control item-qty" data-name="足部酵素噴霧" data-price="680" value="0" min="0" onchange="calc()"></div>
            <div class="item-row"><div class="item-name">足部精華油 (30ML)</div><div class="item-price">$1200</div><input type="number" class="form-control item-qty" data-name="足部精華油" data-price="1200" value="0" min="0" onchange="calc()"></div>
            <div class="item-row"><div class="item-name">溫養護足粉 (10包)</div><div class="item-price">$950</div><input type="number" class="form-control item-qty" data-name="溫養護足粉" data-price="950" value="0" min="0" onchange="calc()"></div>
        </div>

        <div class="category-title">【訂單資訊】</div>
        <div class="form-group">
            <label>付款方式</label>
            <input type="text" class="form-control" value="銀行轉帳 / 匯款" disabled>
            <p class="hint-text">※ 提交後對話視窗會自動彈出匯款帳號</p>
        </div>

        <div class="form-group">
            <label>配送方式</label>
            <select id="deliveryMethod" class="form-control" onchange="toggleAddress()">
                <option value="自取">自取 (免運費)</option>
                <option value="宅配">宅配到府 (運費 +$150)</option>
            </select>
        </div>

        <div id="addressSection" class="form-group">
            <label>收件地址</label>
            <textarea id="uAddr" class="form-control" rows="2" placeholder="請輸入完整收件地址"></textarea>
        </div>

        <div class="summary-box">
            <div class="total-line"><span>商品小計：</span><span>NT$ <span id="subtotal">0</span></span></div>
            <div class="total-line"><span>配送運費：</span><span>NT$ <span id="shipping">0</span></span></div>
            <hr>
            <div class="total-line" style="font-size: 1.25em; color: var(--primary-color);"><span>總計金額：</span><span>NT$ <span id="finalTotal">0</span></span></div>
        </div>

        <div class="form-group mt-3"><label>收件人姓名</label><input type="text" id="uName" class="form-control"></div>
        <div class="form-group"><label>聯絡電話</label><input type="tel" id="uPhone" class="form-control"></div>

        <button id="btnSubmit" class="btn btn-submit btn-block">確認送出訂單</button>
    </div>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
        function toggleAddress() {
            const method = document.getElementById('deliveryMethod').value;
            document.getElementById('addressSection').style.display = (method === '宅配') ? 'block' : 'none';
            calc();
        }

        function calc() {
            let sub = 0;
            document.querySelectorAll('.item-qty').forEach(i => { 
                let val = parseInt(i.value) || 0;
                sub += val * parseInt(i.dataset.price); 
            });
            const method = document.getElementById('deliveryMethod').value;
            // --- 運費修改點：100 改為 150 ---
            let ship = (method === '宅配' && sub > 0) ? 150 : 0;
            document.getElementById('subtotal').innerText = sub;
            document.getElementById('shipping').innerText = ship;
            document.getElementById('finalTotal').innerText = sub + ship;
        }

        async function init() {
            try {
                await liff.init({ liffId: "2009407080-vW4ePXtO" });
                if (!liff.isLoggedIn()) liff.login();
                const p = await liff.getProfile();
                document.getElementById('uName').value = p.displayName;
            } catch (e) { console.log("LIFF Init Error", e); }
        }
        init();

        document.getElementById('btnSubmit').onclick = async function() {
            let items = [];
            document.querySelectorAll('.item-qty').forEach(i => { 
                if(parseInt(i.value) > 0) items.push(`${i.dataset.name}x${i.value}`); 
            });
            
            if (items.length === 0) return alert('請先選擇商品數量');
            
            const method = document.getElementById('deliveryMethod').value;
            const addr = document.getElementById('uAddr').value;
            if (method === '宅配' && !addr) return alert('請填寫收件地址');

            this.disabled = true;
            try {
                await fetch('https://script.google.com/macros/s/AKfycbwv8oFL-Q4E9MlWmmXJd0yVEb_aagpFOwZn8UQ0nAv7gBozrpm2ZTEhsmoZop0beKnD/exec', {
                    method: 'POST', mode: 'no-cors',
                    body: JSON.stringify({
                        formType: "商品訂購",
                        userId: liff.getContext().userId, 
                        userName: document.getElementById('uName').value,
                        phone: document.getElementById('uPhone').value, 
                        method: method,
                        items: items.join(', '),
                        price: document.getElementById('finalTotal').innerText, 
                        payMethod: "銀行轉帳/匯款",
                        // --- note 傳送邏輯優化 ---
                        note: method === '宅配' ? addr : "自取"
                    })
                });
                alert('訂單已提交！\n\n匯款資訊已發送至您的 LINE 對話視窗。');
                liff.closeWindow();
            } catch (e) { 
                alert('提交失敗：' + e); 
                this.disabled = false; 
            }
        };
    </script>
</body>
</html>
